<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>e-SPP SISWA SEKOLAH</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="e-SPP Siswa-Sekolah" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0ea5e9" />
  
  <!-- Panggil file relatif di GitHub -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./Jiraya-free.png" />
  <link rel="apple-touch-icon" href="./Jiraya-free.png" />

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f0f2f5; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .iframe-container { width: 100%; height: 100dvh; overflow: hidden; position: relative; }
    iframe { display: block; width: 100%; height: 100%; border: none; z-index: 10; position: relative; }
    #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
    .spinner { border: 4px solid rgba(14,165,233,.2); border-top: 4px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div id="loader">
      <div class="spinner"></div>
      <p style="color:#64748b; margin-top:16px; font-size:14px; font-weight:600;">Memuat Sistem e-SPP Siswa...</p>
    </div>
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbyQjc_UOeS2NUBSrtiPlhunyS9-qazzNzllT7rV-VlCUCR3cG_dfwVqzQV1Ckc60bF9/exec"
      scrolling="yes"
      allow="camera; microphone; fullscreen; display-capture">
    </iframe>
  </div>

  <script>
    const iframe = document.getElementById('app');
    iframe.addEventListener('load', function() {
      setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
    });

    // Registrasi Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(error => {
          console.error('ServiceWorker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
